<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Welcome to NexaShop</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #f5f5f7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #0071e3, #0047ab); padding: 48px 32px; text-align: center; }
    .header h1 { color: white; margin: 0 0 8px; font-size: 32px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.8); margin: 0; font-size: 16px; }
    .body { padding: 40px 32px; text-align: center; }
    .greeting { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 12px; }
    .message { color: #6e6e73; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .features { display: flex; gap: 16px; margin-bottom: 32px; text-align: left; }
    .feature { flex: 1; padding: 16px; background: #f5f5f7; border-radius: 12px; }
    .feature-icon { font-size: 24px; margin-bottom: 8px; }
    .feature-title { font-size: 14px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
    .feature-desc { font-size: 13px; color: #6e6e73; }
    .footer { background: #f5f5f7; padding: 24px; text-align: center; }
    .footer p { color: #6e6e73; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 NexaShop</h1>
      <p>Welcome aboard!</p>
    </div>

    <div class="body">
      <div class="greeting">Welcome, {{ full_name }}! 🎉</div>
      <div class="message">
        Your account has been created successfully.<br>
        You now have access to NexaShop's admin panel.
      </div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">📦</div>
          <div class="feature-title">Products</div>
          <div class="feature-desc">Manage your product catalog</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🛒</div>
          <div class="feature-title">Orders</div>
          <div class="feature-desc">Track all customer orders</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📈</div>
          <div class="feature-title">Analytics</div>
          <div class="feature-desc">Real-time insights</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>NexaShop — Your E-Commerce Admin Platform</p>
    </div>
  </div>
</body>
</html>
