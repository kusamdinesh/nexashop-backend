<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Order Update</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #f5f5f7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #0071e3; padding: 32px; text-align: center; }
    .header h1 { color: white; margin: 0; font-size: 24px; font-weight: 700; }
    .body { padding: 32px; }
    .greeting { font-size: 18px; font-weight: 600; color: #1d1d1f; margin-bottom: 8px; }
    .subtitle { color: #6e6e73; font-size: 15px; margin-bottom: 32px; }
    .status-box { text-align: center; padding: 32px; background: #f5f5f7; border-radius: 12px; margin-bottom: 24px; }
    .status-icon { font-size: 48px; margin-bottom: 12px; }
    .status-label { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
    .status-desc { font-size: 14px; color: #6e6e73; }
    .order-ref { background: #e8f0fd; border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 24px; }
    .order-ref p { margin: 0; color: #0071e3; font-weight: 600; font-family: monospace; font-size: 16px; }
    .footer { background: #f5f5f7; padding: 24px; text-align: center; }
    .footer p { color: #6e6e73; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛒 NexaShop</h1>
    </div>

    <div class="body">
      <div class="greeting">Hi {{ customer_name }},</div>
      <div class="subtitle">Your order status has been updated.</div>

      <div class="order-ref">
        <p>{{ order_number }}</p>
      </div>

      <div class="status-box">
        <div class="status-icon">{{ status_icon }}</div>
        <div class="status-label">{{ status_label }}</div>
        <div class="status-desc">{{ status_description }}</div>
      </div>
    </div>

    <div class="footer">
      <p>Thank you for shopping with NexaShop 🛒</p>
    </div>
  </div>
</body>
</html>
